<!DOCTYPE html>
<html lang="cn">
<head>
  <meta charset="UTF-8">
  <title>Document</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Description">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/dark.css">
</head>
<body>
  <div id="app"></div>
  <script>
  window.$docsify = {
    name: 'GameNetwork库文档',        // 侧边栏顶部显示的文档标题
    repo: 'LTGVE',   // 在右上角显示GitHub链接
    loadSidebar: true,        // 开启侧边栏，会加载 _sidebar.md 文件
    loadNavbar: true,         // 开启导航栏，会加载 _navbar.md 文件
    subMaxLevel: 2,           // 自动将Markdown的二级标题（##）生成在侧边栏
    search: 'auto',           // 开启全文搜索
  }
  </script>
  <!-- Docsify v4 -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
<script src="//cdn.jsdelivr.net/npm/prismjs@1.30.0/components/prism-csharp.min.js"></script>
<script src="//cdn.jsdelivr.net/npm/docsify-copy-code"></script>
</body>
</html>
